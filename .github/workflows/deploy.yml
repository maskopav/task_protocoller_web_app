name: Deploy via SFTP

on:
  push:
    branches:
      - main # Runs whenever you push to the 'main' branch

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. SETUP NODE.JS ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or whatever version you are using

      # --- 2. BUILD FRONTEND ---
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # --- 3. UPLOAD FRONTEND VIA SFTP ---
      - name: Upload Frontend to Server
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT }}
          password: ${{ secrets.FTP_PASSWORD }}
          # The folder generated by vite/react
          local_path: './frontend/dist/*' 
          # Change this to the public HTML folder on your server!
          remote_path: '/dist' 

      # --- 4. UPLOAD BACKEND VIA SFTP ---
      - name: Upload Backend to Server
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './backend/*'
          # Important: Don't upload node_modules!
          sftp_only: true 
          sftpArgs: '-o ConnectTimeout=5'
          # Change this to where your backend lives on the server!
          remote_path: '/dist/backend'
