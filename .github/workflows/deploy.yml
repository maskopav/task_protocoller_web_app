name: Deploy via FTP

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. SETUP NODE.JS ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      # --- 2. BUILD FRONTEND ---
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # --- 3. UPLOAD FRONTEND VIA SFTP ---
      - name: Upload Frontend to Server
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './frontend/dist/*' 
          remote_path: '/dist' 

      # --- 4. PREPARE BACKEND (DELETE NODE_MODULES) ---
      - name: Remove Backend node_modules before upload
        run: rm -rf ./backend/node_modules

      # --- 5. UPLOAD BACKEND VIA SFTP ---
      - name: Upload Backend to Server
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './backend/*'
          sftp_only: true 
          sftpArgs: '-o ConnectTimeout=5'
          # Change to your real WEDOS backend folder path
          remote_path: '/dist/backend'
